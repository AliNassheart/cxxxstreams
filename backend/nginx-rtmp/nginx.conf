# Nginx + nginx-rtmp-module configuration.
#
# Purpose: accept RTMP ingest ONLY from the platform owner's own encoder
# (e.g. OBS Studio) using a stream key issued by StreamHub, transcode/package
# it to HLS with FFmpeg (invoked by nginx-rtmp's exec directive or a sidecar),
# and serve the resulting .m3u8/.ts segments to the frontend player.
#
# This file intentionally has no functionality for pulling, relaying, or
# re-publishing any third-party or externally sourced broadcast. The
# on_publish webhook rejects any stream key that isn't registered by the
# platform owner in the StreamHub database.

worker_processes auto;
events { worker_connections 1024; }

rtmp {
  server {
    listen 1935;
    chunk_size 4096;

    application live {
      live on;
      record off;

      # Authorize the publish against StreamHub's backend before accepting frames.
      on_publish http://backend:4000/api/streams/rtmp/on-publish;
      on_publish_done http://backend:4000/api/streams/rtmp/on-publish-done;

      # Transcode to adaptive HLS. Requires ffmpeg on the RTMP host/container.
      exec ffmpeg -i rtmp://localhost/live/$name
        -c:v libx264 -preset veryfast -tune zerolatency -g 48 -sc_threshold 0
        -c:a aac -b:a 128k -ac 2
        -f hls -hls_time 2 -hls_list_size 6 -hls_flags delete_segments+append_list
        -hls_segment_filename /tmp/hls/$name/seg_%03d.ts
        /tmp/hls/$name/index.m3u8;
    }
  }
}

http {
  include mime.types;
  default_type application/octet-stream;

  server {
    listen 8080;

    location /hls {
      types {
        application/vnd.apple.mpegurl m3u8;
        video/mp2t ts;
      }
      root /tmp;
      add_header Cache-Control no-cache always;
      add_header Access-Control-Allow-Origin * always;
    }

    location /stat {
      rtmp_stat all;
    }
  }
}
