server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback so client-side routes (e.g. /watch/:id) resolve correctly.
    location / {
        try_files $uri /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
